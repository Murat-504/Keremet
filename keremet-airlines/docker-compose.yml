version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: keremet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       keremet_airlines
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: keremet_pass_2025
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Node.js Backend ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keremet_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          5000
      DB_HOST:       db
      DB_PORT:       5432
      DB_NAME:       keremet_airlines
      DB_USER:       postgres
      DB_PASSWORD:   keremet_pass_2025
      JWT_SECRET:    keremet_super_secret_jwt_key_2025
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL:  http://localhost:80
    ports:
      - "5000:5000"

  # ── React Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keremet_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
